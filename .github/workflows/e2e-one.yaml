name: e2e One

on:
  workflow_dispatch:
    inputs:
      name:
        description: Name
        required: true
        type: string
      channel:
        description: Channel name
        required: true
        default: "live"
        type: choice
        options:
          - live
          - dev
      enabled_free_tier:
        description: Enable free tier?
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: "${{ inputs.name }}"
    concurrency:
      group: ${{ inputs.name }}
      cancel-in-progress: false
    uses: ./.github/workflows/test.yaml
    with:
      name: ${{ inputs.name }}
      channel: ${{ inputs.channel }}
      enabled_free_tier: ${{ inputs.enabled_free_tier }}
    secrets:
      session-id: ${{ secrets.IXIMIUZ_SESSION_ID }}
      access-token: ${{ secrets.IXIMIUZ_ACCESS_TOKEN }}
