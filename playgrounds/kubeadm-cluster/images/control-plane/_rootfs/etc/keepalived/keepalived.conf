! Configuration File for keepalived

global_defs {
    enable_script_security
}

vrrp_script check {
  script "/etc/keepalived/check.sh"
  interval 2
  fall 2
  rise 2
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 101
    authentication {
        auth_type PASS
        auth_pass iximiuz
    }

    virtual_ipaddress {
        172.16.0.254 dev eth0 label vip
    }

    track_script {
        check
    }
}
